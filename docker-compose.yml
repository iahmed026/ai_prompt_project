services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
